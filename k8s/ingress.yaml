# dkp-demo Ingress Configuration
# ===================================
#
# CONFIGURATION REQUIRED:
# =========================
# Before deploying, replace the following placeholders:
#
# dkp-demo: Your project identifier (e.g., "my-app")
# dkp-demo.local: Your application hostname (e.g., "app.example.com" or "app.local")
#
# Example: if your project is called "my-app" and runs at myapp.local:
# - Replace dkp-demo with "my-app"
# - Replace dkp-demo.local with "myapp.local"
#
# Notes:
# - ingressClassName: nginx (using NGINX ingress controller)
# - rewrite-target: / (standard path rewriting)
# - SSE streaming support configured for agent communication
# - SSL redirect disabled for development (enable for production)
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "dkp-demo-ingress"  # Replace dkp-demo with your project name
  namespace: default
  labels:
    app: "dkp-demo"  # Replace dkp-demo with your project name
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    # SSE (Server-Sent Events) streaming support
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/connection-proxy-header: "keep-alive"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
spec:
  ingressClassName: nginx
  rules:
  - host: "dkp-demo.local"  # Replace dkp-demo.local with your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: "dkp-demo-service"  # Replace dkp-demo with your project name
            port:
              name: http
