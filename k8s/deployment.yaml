# dkp-demo Deployment Configuration
# ===================================
#
# CONFIGURATION REQUIRED:
# =========================
# Before deploying, replace the following placeholders:
#
# dkp-demo: Your project identifier (e.g., "my-app")
# localhost:32000: Your container registry host (e.g., "registry.example.com" or "localhost:32000")
#
# Example: if your project is called "my-app" and registry is "registry.example.com":
# - Replace dkp-demo with "my-app"
# - Replace localhost:32000 with "registry.example.com"
#
# Notes:
# - replicas: 3 (adjust based on your load requirements)
# - containerPort: 3000 (Next.js default, adjust if your app uses different port)
# - AGENT_URL: points to agent service (adjust if agent service name changes)
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: "dkp-demo"  # Replace dkp-demo with your project name
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: "dkp-demo"  # Replace dkp-demo with your project name
  template:
    metadata:
      labels:
        app: "dkp-demo"  # Replace dkp-demo with your project name
    spec:
      containers:
      - name: "dkp-demo"  # Replace dkp-demo with your project name
        image: "localhost:32000/dkp-demo:latest"  # Replace localhost:32000 and dkp-demo
        ports:
        - containerPort: 3000
        env:
        - name: AGENT_URL
          value: "http://agent-service:8000/"
        envFrom:
        - secretRef:
            name: "dkp-demo-secrets"  # Replace dkp-demo with your project name
        - configMapRef:
            name: "dkp-demo-config"  # Replace dkp-demo with your project name
