# Agent Deployment Configuration
# ===================================
#
# CONFIGURATION REQUIRED:
# =========================
# Before deploying, replace the following placeholders:
#
# {{PROJECT_NAME}}: Your project identifier (e.g., "my-app")
# {{REGISTRY_HOST}}: Your container registry host (e.g., "registry.example.com" or "localhost:32000")
#
# Notes:
# - This deployment uses the generic "agent" name and labels
# - Agent secrets and configmaps are shared with the main application
# - Health checks configured for agent API at /api/health
# - Resource requests/limits configured for typical agent workload
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
    spec:
      containers:
      - name: agent
        image: {{REGISTRY_HOST}}/agent:latest  # Replace {{REGISTRY_HOST}} with your registry host
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: {{PROJECT_NAME}}-secrets  # Replace {{PROJECT_NAME}} with your project name
        - configMapRef:
            name: {{PROJECT_NAME}}-config  # Replace {{PROJECT_NAME}} with your project name
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 15
          failureThreshold: 3
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 3
          timeoutSeconds: 5
        resources:
          requests:
            memory: "1Gi"
            cpu: "100m"
          limits:
            memory: "2Gi"
            cpu: "1000m"