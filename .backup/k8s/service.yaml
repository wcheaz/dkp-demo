# {{PROJECT_NAME}} Service Configuration
# ===================================
#
# CONFIGURATION REQUIRED:
# =========================
# Before deploying, replace the following placeholders:
#
# {{PROJECT_NAME}}: Your project identifier (e.g., "my-app")
#
# Example: if your project is called "my-app":
# - Replace {{PROJECT_NAME}} with "my-app"
#
# Notes:
# - port: 80 (standard HTTP port for ClusterIP service)
# - targetPort: 3000 (matches application container port)
# - type: ClusterIP (appropriate for internal service access)
# - Service port configuration is typically static for cluster-internal services
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: {{PROJECT_NAME}}-service  # Replace {{PROJECT_NAME}} with your project name
  namespace: default
  labels:
    app: {{PROJECT_NAME}}  # Replace {{PROJECT_NAME}} with your project name
spec:
  type: ClusterIP
  selector:
    app: {{PROJECT_NAME}}  # Replace {{PROJECT_NAME}} with your project name
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
    name: http
